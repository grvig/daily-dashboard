<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>Daily Dashboard</h1>
  <div class="cards">
    <div class="card" id="weather-card">
      <h2>Weather</h2>
      <p id="weather-content">Loading...</p>
    </div>
    <div class="card" id="todo-card">
      <h2>To-Do</h2>
      <form id="todo-form">
        <input type="text" id="todo-input" placeholder="New task..." required>
        <button type="submit">Add</button>
      </form>
      <ul id="todo-list"></ul>
    </div>
    <div class="card" id="github-card">
      <h2>GitHub</h2>
      <p id="github-content">Loading...</p>
    </div>
    <div class="card" id="news-card">
      <h2>News</h2>
      <ul id="news-list"><li>Loading...</li></ul>
    </div>
    <div class="card" id="prices-card">
      <h2>Prices</h2>
      <ul id="prices-list"><li>Loading...</li></ul>
    </div>
  </div>

  <script>
    fetch("/api/weather")
      .then((res) => res.json())
      .then((data) => {
        document.getElementById("weather-content").innerHTML = `
          <strong>${data.city}${data.region ? ", " + data.region : ""}</strong><br>
          ${data.temperature_c}&deg;C, ${data.condition}<br>
          Wind: ${data.wind_speed_kmh} km/h
        `;
      })
      .catch(() => {
        document.getElementById("weather-content").textContent = "Unable to load weather.";
      });

    const todoList = document.getElementById("todo-list");
    const todoForm = document.getElementById("todo-form");
    const todoInput = document.getElementById("todo-input");

    function renderTodos(todos) {
      todoList.innerHTML = "";
      todos.forEach((todo) => {
        const li = document.createElement("li");
        li.className = todo.done ? "done" : "";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = todo.done;
        checkbox.addEventListener("change", () => toggleTodo(todo.id));

        const span = document.createElement("span");
        span.textContent = todo.title;

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "x";
        deleteBtn.type = "button";
        deleteBtn.addEventListener("click", () => deleteTodo(todo.id));

        li.append(checkbox, span, deleteBtn);
        todoList.appendChild(li);
      });
    }

    function loadTodos() {
      fetch("/api/todos")
        .then((res) => res.json())
        .then(renderTodos);
    }

    function toggleTodo(id) {
      fetch(`/api/todos/${id}/toggle`, { method: "PATCH" }).then(loadTodos);
    }

    function deleteTodo(id) {
      fetch(`/api/todos/${id}`, { method: "DELETE" }).then(loadTodos);
    }

    todoForm.addEventListener("submit", (e) => {
      e.preventDefault();
      fetch("/api/todos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: todoInput.value }),
      }).then(() => {
        todoInput.value = "";
        loadTodos();
      });
    });

    loadTodos();

    fetch("/api/github")
      .then((res) => res.json())
      .then((data) => {
        document.getElementById("github-content").innerHTML = `
          <strong>@${data.username}</strong><br>
          ${data.public_repos} public repos, ${data.followers} followers<br>
          Push streak: ${data.streak_days} day${data.streak_days === 1 ? "" : "s"}
        `;
      })
      .catch(() => {
        document.getElementById("github-content").textContent = "Unable to load GitHub stats.";
      });

    fetch("/api/news")
      .then((res) => res.json())
      .then((snippets) => {
        const newsList = document.getElementById("news-list");
        newsList.innerHTML = "";
        snippets.forEach((snippet) => {
          const li = document.createElement("li");

          const link = document.createElement("a");
          link.href = snippet.link;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          link.textContent = snippet.title;

          const summary = document.createElement("p");
          summary.textContent = snippet.summary;

          li.append(link, summary);
          newsList.appendChild(li);
        });
      })
      .catch(() => {
        document.getElementById("news-list").innerHTML = "<li>Unable to load news.</li>";
      });

    fetch("/api/prices")
      .then((res) => res.json())
      .then((coins) => {
        const pricesList = document.getElementById("prices-list");
        pricesList.innerHTML = "";
        coins.forEach((coin) => {
          const li = document.createElement("li");
          const up = coin.change_24h_pct >= 0;
          li.innerHTML = `
            <span class="coin-name">${coin.id}</span>
            <span class="coin-price">$${coin.price_usd.toLocaleString()}</span>
            <span class="coin-change ${up ? "up" : "down"}">${up ? "+" : ""}${coin.change_24h_pct}%</span>
          `;
          pricesList.appendChild(li);
        });
      })
      .catch(() => {
        document.getElementById("prices-list").innerHTML = "<li>Unable to load prices.</li>";
      });
  </script>
</body>
</html>
