<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1>Daily Dashboard</h1>
  <div class="cards">
    <div class="card" id="weather-card">
      <h2>Weather</h2>
      <p id="weather-content">Loading...</p>
    </div>
    <div class="card" id="todo-card">
      <h2>To-Do</h2>
      <form id="todo-form">
        <input type="text" id="todo-input" placeholder="New task..." required>
        <button type="submit">Add</button>
      </form>
      <ul id="todo-list"></ul>
    </div>
    <div class="card" id="github-card">
      <h2>GitHub</h2>
      <p id="github-content">Loading...</p>
    </div>
    <div class="card" id="mood-card">
      <h2>Mood</h2>
      <form id="mood-form">
        <div id="mood-scores"></div>
        <input type="text" id="mood-note" placeholder="Note (optional)">
        <button type="submit">Log</button>
      </form>
      <ul id="mood-list"></ul>
    </div>
  </div>

  <script>
    fetch("/api/weather")
      .then((res) => res.json())
      .then((data) => {
        document.getElementById("weather-content").innerHTML = `
          <strong>${data.city}${data.region ? ", " + data.region : ""}</strong><br>
          ${data.temperature_c}&deg;C, ${data.condition}<br>
          Wind: ${data.wind_speed_kmh} km/h
        `;
      })
      .catch(() => {
        document.getElementById("weather-content").textContent = "Unable to load weather.";
      });

    const todoList = document.getElementById("todo-list");
    const todoForm = document.getElementById("todo-form");
    const todoInput = document.getElementById("todo-input");

    function renderTodos(todos) {
      todoList.innerHTML = "";
      todos.forEach((todo) => {
        const li = document.createElement("li");
        li.className = todo.done ? "done" : "";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = todo.done;
        checkbox.addEventListener("change", () => toggleTodo(todo.id));

        const span = document.createElement("span");
        span.textContent = todo.title;

        const deleteBtn = document.createElement("button");
        deleteBtn.textContent = "x";
        deleteBtn.type = "button";
        deleteBtn.addEventListener("click", () => deleteTodo(todo.id));

        li.append(checkbox, span, deleteBtn);
        todoList.appendChild(li);
      });
    }

    function loadTodos() {
      fetch("/api/todos")
        .then((res) => res.json())
        .then(renderTodos);
    }

    function toggleTodo(id) {
      fetch(`/api/todos/${id}/toggle`, { method: "PATCH" }).then(loadTodos);
    }

    function deleteTodo(id) {
      fetch(`/api/todos/${id}`, { method: "DELETE" }).then(loadTodos);
    }

    todoForm.addEventListener("submit", (e) => {
      e.preventDefault();
      fetch("/api/todos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title: todoInput.value }),
      }).then(() => {
        todoInput.value = "";
        loadTodos();
      });
    });

    loadTodos();

    fetch("/api/github")
      .then((res) => res.json())
      .then((data) => {
        document.getElementById("github-content").innerHTML = `
          <strong>@${data.username}</strong><br>
          ${data.public_repos} public repos, ${data.followers} followers<br>
          Push streak: ${data.streak_days} day${data.streak_days === 1 ? "" : "s"}
        `;
      })
      .catch(() => {
        document.getElementById("github-content").textContent = "Unable to load GitHub stats.";
      });

    const MOOD_EMOJI = { 1: "😞", 2: "🙁", 3: "😐", 4: "🙂", 5: "😄" };
    let selectedMoodScore = 3;

    const moodScoresEl = document.getElementById("mood-scores");
    Object.entries(MOOD_EMOJI).forEach(([score, emoji]) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = emoji;
      btn.className = Number(score) === selectedMoodScore ? "selected" : "";
      btn.addEventListener("click", () => {
        selectedMoodScore = Number(score);
        [...moodScoresEl.children].forEach((c) => c.classList.remove("selected"));
        btn.classList.add("selected");
      });
      moodScoresEl.appendChild(btn);
    });

    function renderMoods(moods) {
      const moodList = document.getElementById("mood-list");
      moodList.innerHTML = "";
      moods.forEach((mood) => {
        const li = document.createElement("li");
        const date = new Date(mood.created_at).toLocaleDateString();
        li.textContent = `${MOOD_EMOJI[mood.score]} ${date}${mood.note ? " — " + mood.note : ""}`;
        moodList.appendChild(li);
      });
    }

    function loadMoods() {
      fetch("/api/mood")
        .then((res) => res.json())
        .then(renderMoods);
    }

    document.getElementById("mood-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const noteInput = document.getElementById("mood-note");
      fetch("/api/mood", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ score: selectedMoodScore, note: noteInput.value || null }),
      }).then(() => {
        noteInput.value = "";
        loadMoods();
      });
    });

    loadMoods();
  </script>
</body>
</html>
